backend:
  name: github
  repo: ibrahim9-debug/astro-news
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "articles"
    label: "Artikel"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Cerita Pribadi", "Mindful"] }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Cuplikan", name: "description", widget: "string" }
      - { label: "Konten", name: "body", widget: "markdown" }
